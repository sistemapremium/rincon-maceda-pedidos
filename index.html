:root{--grass:#879665;--off:#F7F1EB;--jungle:#464C32;--earth:#BC8850;--light:#D7C68E;--ocean:#9CB5B2}
*{box-sizing:border-box}
body{margin:0;background:var(--off);color:var(--jungle);font-family:'CGothic',-apple-system,Segoe UI,Arial,sans-serif;padding-bottom:135px}
header{background:#fff;padding:12px 16px 10px;text-align:center;border-bottom:2px solid var(--light);position:relative}
header img{height:101px;display:block;margin:0 auto}
.ighead{position:absolute;top:14px;right:16px;color:var(--grass);display:inline-flex}
.ighead svg{width:28px;height:28px}
.loginbtn{position:absolute;top:13px;left:14px;background:var(--grass);color:#fff;border:none;border-radius:18px;padding:7px 13px;font-size:12.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.loginbtn .uimg{width:20px;height:20px;border-radius:50%}
.pie{background:var(--jungle);color:var(--off);margin-top:22px;padding:22px 16px 28px;text-align:center;font-size:14px;line-height:1.55}
.pie b{color:var(--light);font-size:12px;letter-spacing:1px;display:block;margin-top:14px;font-weight:700}
.pie a.ig{display:inline-flex;align-items:center;gap:7px;color:#fff;text-decoration:none;margin-top:16px;font-weight:700}
.pie a.ig svg{width:22px;height:22px}
.reviews{max-width:800px;margin:12px auto 2px;padding:0 12px}
.reviews h3{font-family:'Aldo',serif;font-size:20px;color:var(--jungle);text-align:center;margin:6px 0 8px}
.rev-card{background:#fff;border-radius:14px;border:1px solid #ece4d7;box-shadow:0 1px 5px rgba(70,76,50,.06);padding:15px 18px;text-align:center;min-height:118px;display:flex;flex-direction:column;justify-content:center;transition:opacity .3s}
.rev-stars{color:#e0a93f;letter-spacing:3px;font-size:15px}
.rev-text{color:var(--jungle);font-size:14.5px;line-height:1.5;margin:8px 0 6px;font-style:italic}
.rev-name{color:var(--grass);font-weight:800;font-size:13px}
.rev-dots{text-align:center;margin-top:9px}
.rev-dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:#cfd6c8;margin:0 3px;cursor:pointer}
.rev-dots span.on{background:var(--grass)}
header .sub{color:var(--grass);font-size:12px;margin-top:2px;letter-spacing:1px;font-weight:700}
.sticky-top{position:sticky;top:0;z-index:10;background:#fff;box-shadow:0 3px 9px rgba(70,76,50,.10);padding-bottom:4px}
.barra{background:#fff;padding:9px 12px}
.barra input{width:100%;padding:11px 14px;border:1.5px solid var(--grass);border-radius:11px;font-size:15px;font-family:inherit;color:var(--jungle);outline:none}
#chips{display:flex;gap:7px;overflow-x:auto;padding:10px 12px 3px}
#chips button{white-space:nowrap;border:1.5px solid #d7ddcd;background:#fff;color:var(--jungle);padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:700;font-family:inherit}
#chips button.act{background:var(--grass);color:#fff;border-color:var(--grass)}
#contador{padding:5px 14px;color:var(--grass);font-size:12.5px;max-width:800px;margin:0 auto;font-weight:700}
#lista{padding:8px 12px;max-width:800px;margin:0 auto}
.secc{font-family:'Aldo',serif;font-size:24px;font-weight:800;color:var(--jungle);background:#efe9dd;border-left:6px solid var(--earth);padding:12px 15px;border-radius:9px;margin:20px 2px 8px;display:flex;align-items:center;gap:11px}
.secc .sico{color:var(--grass);display:inline-flex}.secc .sico svg{width:25px;height:25px}
.secc em{color:var(--grass);font-style:normal;font-size:13px;font-family:'CGothic'}
.prod{background:#fff;border-radius:14px;padding:11px 13px;margin:9px 0;display:flex;align-items:center;gap:13px;box-shadow:0 1px 5px rgba(70,76,50,.06)}
.ico{width:46px;height:46px;border-radius:50%;background:#fbf8f3;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid #ece4d7;color:var(--grass)}
.ico svg{width:24px;height:24px}
.info{flex:1;min-width:0}.nom{font-weight:700;font-size:14px;line-height:1.25;color:var(--jungle)}
.meta{color:var(--grass);font-size:12px;margin-top:2px}.precio{color:var(--earth);font-weight:800;font-size:15px;white-space:nowrap}
.qty{display:flex;align-items:center;gap:6px}
.qty button{width:32px;height:32px;border:1px solid #e3dccf;border-radius:9px;background:var(--off);font-size:19px;font-weight:800;cursor:pointer;color:var(--jungle)}
.qty button.add{background:var(--grass);color:#fff;border-color:var(--grass)}.qty span{min-width:20px;text-align:center;font-weight:800}
.fav{background:none;border:none;cursor:pointer;color:#cdd3c6;font-size:22px;line-height:1;padding:0 2px;transition:transform .1s}
.fav.on{color:#d9534f}.fav:active{transform:scale(1.25)}
#carrito{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--light);box-shadow:0 -3px 14px rgba(70,76,50,.13);padding:12px 14px;z-index:20}
#carrito .top{display:flex;justify-content:space-between;align-items:center;font-size:14px}
.total{font-family:'Aldo',serif;font-size:23px;color:var(--jungle)}
#enviar{width:100%;margin-top:10px;background:#25D366;color:#fff;border:none;padding:14px;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit}
#enviar:disabled{background:#bcbfb0}
#verCarrito{color:var(--earth);font-weight:700;cursor:pointer;text-decoration:underline}
#detalleCarrito{max-height:220px;overflow:auto;margin-top:8px;display:none}
#detalleCarrito .it{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #efe9df}
</style></head><body>

const carrito={}; let rubroSel="";
const FAV=new Set(); let currentUser=null;
function togFav(cod,btn){
  if(!currentUser){ pedirLogin(); return; }
  if(FAV.has(cod))FAV.delete(cod);else FAV.add(cod);
  if(btn){btn.classList.toggle("on");btn.textContent=FAV.has(cod)?"♥":"♡";}
  const fc=document.getElementById("favcount");if(fc)fc.textContent=FAV.size;
  guardarFav();
  if(rubroSel==="__FAV__")render();
}
const fmt=n=>"$ "+n.toLocaleString("es-AR");
const sa=s=>s.normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase();
const conteo={}; PRODUCTOS.forEach(p=>conteo[p.rubro]=(conteo[p.rubro]||0)+1);
const rubros=Object.keys(conteo).sort((a,b)=>((a==='Otros')-(b==='Otros'))||(conteo[b]-conteo[a]));
const chips=document.getElementById("chips");
function chip(txt,val){const b=document.createElement("button");b.textContent=txt;b.onclick=()=>{rubroSel=val;[...chips.children].forEach(c=>c.classList.remove("act"));b.classList.add("act");render();window.scrollTo(0,0);};return b;}
const todos=chip("Todas","");todos.classList.add("act");chips.appendChild(todos);
const favChip=chip("Favoritos","__FAV__");favChip.innerHTML="♥ Favoritos (<span id=favcount>"+FAV.size+"</span>)";chips.appendChild(favChip);
rubros.forEach(r=>chips.appendChild(chip(r+" ("+conteo[r]+")",r)));
const lista=document.getElementById("lista"),contador=document.getElementById("contador");
function tarjeta(p){
  const cant=carrito[p.cod]?carrito[p.cod].qty:0;
  const d=document.createElement("div");d.className="prod";
  d.innerHTML="<div class=ico>"+(ICON[p.rubro]||ICON['Otros'])+"</div>"+
    "<div class=info><div class=nom>"+p.nom+"</div><div class=meta>cod "+p.cod+"</div></div>"+
    "<button class='fav"+(FAV.has(p.cod)?" on":"")+"' title='Favorito' onclick=\"togFav('"+p.cod+"',this)\">"+(FAV.has(p.cod)?"♥":"♡")+"</button>"+
    "<div class=precio>"+fmt(p.precio)+"</div>"+
    "<div class=qty><button onclick=\"cambiar('"+p.cod+"',-1)\">-</button><span id=q_"+p.cod+">"+cant+"</span><button class=add onclick=\"cambiar('"+p.cod+"',1)\">+</button></div>";
  return d;
}
function encabezado(r,n){
  const h=document.createElement("div");h.className="secc";
  h.innerHTML="<span class=sico>"+(ICON[r]||"")+"</span>"+r+" <em>("+n+")</em>";
  return h;
}
function render(){
  const q=sa(document.getElementById("buscar").value.trim());
  lista.innerHTML="";
  if(rubroSel==="" && !q){            // TODAS: agrupado por categoria
    let total=0;
    rubros.forEach(r=>{
      const items=PRODUCTOS.filter(p=>p.rubro===r);
      if(!items.length)return;
      lista.appendChild(encabezado(r,items.length));
      items.forEach(p=>lista.appendChild(tarjeta(p)));
      total+=items.length;
    });
    contador.textContent=total+" productos · ordenados por categoria";
  } else {                            // rubro puntual o busqueda: lista simple
    let res=PRODUCTOS.filter(p=>{
      if(rubroSel==="__FAV__"){ if(!FAV.has(p.cod))return false; }
      else if(rubroSel && p.rubro!==rubroSel){ return false; }
      if(q){const t=sa(p.nom+" "+p.cod+" "+p.marca);if(!q.split(/\s+/).filter(Boolean).every(w=>t.includes(w)))return false;}
      return true;});
    const tot=res.length,CAP=250,rec=res.length>CAP;res=res.slice(0,CAP);
    if(rubroSel==="__FAV__" && tot===0){contador.textContent=currentUser?"Todavía no tenés favoritos. Tocá el ♡ en los productos para guardarlos.":"Iniciá sesión con Google (botón \"Ingresar\" arriba) para usar tus favoritos.";}
    else{contador.textContent=tot+" producto(s)"+(rec?" - mostrando 250, usa el buscador":"");}
    res.forEach(p=>lista.appendChild(tarjeta(p)));
  }
}
function cambiar(cod,d){const p=PRODUCTOS.find(x=>x.cod===cod);const a=carrito[cod]?carrito[cod].qty:0;const n=Math.max(0,a+d);if(n===0)delete carrito[cod];else carrito[cod]={p,qty:n};const s=document.getElementById("q_"+cod);if(s)s.textContent=n;upd();}
function upd(){const it=Object.values(carrito);let n=0,t=0;it.forEach(x=>{n+=x.qty;t+=x.qty*x.p.precio;});document.getElementById("nItems").textContent=n;document.getElementById("total").textContent=fmt(t);document.getElementById("enviar").disabled=(n===0);document.getElementById("detalleCarrito").innerHTML=it.map(x=>"<div class=it><span>"+x.qty+" x "+x.p.nom+"</span><span>"+fmt(x.qty*x.p.precio)+"</span></div>").join("");}
document.getElementById("verCarrito").onclick=function(){const d=document.getElementById("detalleCarrito");d.style.display=d.style.display==="block"?"none":"block";};
document.getElementById("buscar").oninput=render;
document.getElementById("enviar").onclick=function(){const it=Object.values(carrito);if(!it.length)return;let txt="Hola! Quiero hacer este pedido en Rincon Maceda:\n\n";let t=0;it.forEach(x=>{const s=x.qty*x.p.precio;t+=s;txt+="• "+x.qty+" x "+x.p.nom+" - "+fmt(s)+"\n";});txt+="\nTOTAL: "+fmt(t);window.open("https://wa.me/"+NUMERO+"?text="+encodeURIComponent(txt),"_blank");};
const REVIEWS=[
 {n:"Lorena G.",t:"Excelente, gran atención y un ambiente ideal para conseguir productos, comida y postres sanos y deliciosos. Los súper recomiendo!"},
 {n:"Victoria O.",t:"No solo muy buena variedad de productos, sino que me atendieron impecable! Mucha paciencia y ayuda para buscar lo que necesitaba según mis restricciones alimentarias. Para volver siempre!"},
 {n:"Andrea N.",t:"Unas genias las chicas, súper atentas. Todo lo que compré muy rico y bueno. Amo sus videos!"},
 {n:"Sebastián B.",t:"Les escribí para consultar precios y, sin haber ido a comprar, se tomaron el tiempo de detallar cada producto con su precio. Muy buenos precios!"},
 {n:"Gisela T.",t:"Excelentes productos y atención personalizada! Hermoso lugar."},
 {n:"Mariano A.",t:"Destaco la atención que tienen siempre, buenos productos, lindo ambiente."},
 {n:"Lissy",t:"Son muy serviciales y agradables las vendedoras. Sigan así!"},
 {n:"Adriana R.",t:"Excelente asesoramiento de las chicas!"},
 {n:"María Celeste R.",t:"Variado y buena atención!"}
];
let ri=0;
const revCard=document.getElementById("revCard"), revDots=document.getElementById("revDots");
REVIEWS.forEach((_,i)=>{const s=document.createElement("span");s.onclick=()=>{ri=i;pintarRev();};revDots.appendChild(s);});
function pintarRev(){const r=REVIEWS[ri];revCard.style.opacity=0;setTimeout(()=>{revCard.innerHTML="<div class=rev-stars>★★★★★</div><div class=rev-text>“"+r.t+"”</div><div class=rev-name>— "+r.n+"</div>";[...revDots.children].forEach((d,j)=>d.classList.toggle("on",j===ri));revCard.style.opacity=1;},160);}
pintarRev();
setInterval(()=>{ri=(ri+1)%REVIEWS.length;pintarRev();},4800);

const firebaseConfig={apiKey:"AIzaSyBInPQeMu1dCH3leUtCoTZtgbkhrmVXEpI",authDomain:"rincon-maceda.firebaseapp.com",projectId:"rincon-maceda",storageBucket:"rincon-maceda.firebasestorage.app",messagingSenderId:"195196508954",appId:"1:195196508954:web:2d72c13bfecea82f9ceaa3"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(), db=firebase.firestore();
const prov=new firebase.auth.GoogleAuthProvider();
function pedirLogin(){ auth.signInWithPopup(prov).catch(e=>alert("No se pudo iniciar sesión: "+e.message)); }
function logout(){ auth.signOut(); }
async function guardarFav(){ if(currentUser){ try{ await db.collection("usuarios").doc(currentUser.uid).set({favoritos:[...FAV]},{merge:true}); }catch(e){console.log(e);} } }
const loginBtn=document.getElementById("loginBtn");
loginBtn.onclick=pedirLogin;
auth.onAuthStateChanged(async (u)=>{
  currentUser=u;
  if(u){
    loginBtn.innerHTML=(u.photoURL?"<img class=uimg src='"+u.photoURL+"'>":"")+(u.displayName?u.displayName.split(" ")[0]:"Salir");
    loginBtn.onclick=logout;
    try{ const d=await db.collection("usuarios").doc(u.uid).get(); FAV.clear(); ((d.exists&&d.data().favoritos)||[]).forEach(c=>FAV.add(c)); }catch(e){console.log(e);}
  } else {
    loginBtn.innerHTML="Ingresar"; loginBtn.onclick=pedirLogin; FAV.clear();
  }
  const fc=document.getElementById("favcount"); if(fc)fc.textContent=FAV.size;
  render();
});

render();upd();
