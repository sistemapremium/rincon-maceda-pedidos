:root{--grass:#879665;--grass-d:#6f7d50;--off:#F7F1EB;--jungle:#464C32;--earth:#BC8850;--earth-d:#a5743f;--light:#D7C68E;--paper:#fff;--ink:#3c4129;--mut:#6f7559;--line:#ece4d7;--sh:0 6px 18px rgba(70,76,50,.10)}
*{box-sizing:border-box;margin:0}
body{background:radial-gradient(700px 460px at 8% -4%,rgba(135,150,101,.10),transparent 60%),var(--off);color:var(--ink);font-family:'Inter',-apple-system,Segoe UI,sans-serif;letter-spacing:-.01em;-webkit-font-smoothing:antialiased;padding-bottom:40px}
header{background:linear-gradient(165deg,#4c5238,var(--jungle));color:#fff;padding:16px 18px;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--light)}
header img{height:42px;filter:brightness(0) invert(1)}
header .h1{font-family:'Aldo',serif;font-size:22px}
header .upd{margin-left:auto;font-size:12px;color:var(--light);display:flex;align-items:center;gap:10px}
header button{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:10px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.wrap{max-width:1100px;margin:0 auto;padding:16px 14px}
/* login */
#login{max-width:360px;margin:60px auto;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--sh);padding:26px 22px;text-align:center}
#login .t{font-family:'Aldo',serif;font-size:24px;color:var(--jungle);margin-bottom:4px}
#login p{color:var(--mut);font-size:13px;margin-bottom:16px}
#login input{width:100%;padding:13px 14px;border:1.5px solid #dfe3d2;border-radius:12px;font-size:15px;font-family:inherit;margin-bottom:11px;outline:none}
#login input:focus{border-color:var(--grass);box-shadow:0 0 0 4px rgba(135,150,101,.16)}
#login button{width:100%;background:linear-gradient(135deg,var(--grass),var(--grass-d));color:#fff;border:none;padding:13px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
#login .err{color:#d9534f;font-size:13px;min-height:18px;margin-top:6px}
#panel{display:none}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--sh)}
.kpi .n{font-size:27px;font-weight:800;color:var(--jungle);font-variant-numeric:tabular-nums}
.kpi .l{font-size:12px;color:var(--mut);font-weight:600;margin-top:2px}
.kpi .s{font-size:11px;color:var(--grass-d);font-weight:700;margin-top:3px}
.kpi.green .n{color:var(--grass-d)} .kpi.earth .n{color:var(--earth-d)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:640px){.row2{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--sh)}
.card h3{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin-bottom:10px;font-weight:700}
.bar{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:13px}
.bar .lab{min-width:90px;color:var(--ink);font-weight:600}.bar .track{flex:1;height:9px;background:#eee7da;border-radius:6px;overflow:hidden}
.bar .fill{height:100%;background:linear-gradient(90deg,var(--grass),var(--grass-d));border-radius:6px}.bar .v{min-width:34px;text-align:right;font-weight:800;color:var(--jungle);font-variant-numeric:tabular-nums}
.tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.tools input,.tools select{padding:10px 12px;border:1.5px solid #dfe3d2;border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:#fff}
.tools input{flex:1;min-width:160px}
.tablecard{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh);overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:680px}
th{text-align:left;background:#efe9dd;color:var(--jungle);font-weight:800;padding:10px 12px;position:sticky;top:0;white-space:nowrap}
td{padding:10px 12px;border-top:1px solid #f0ebe0;vertical-align:top}
tr:hover td{background:#fbf9f4}
td .nm{font-weight:700;color:var(--jungle)}
.wa{color:#1faa54;font-weight:700;text-decoration:none;white-space:nowrap}
.est{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;white-space:nowrap}
.est.wa{background:rgba(37,211,102,.14);color:#1a8f48} .est.visto{background:#eee7da;color:var(--mut)}
.muted{color:var(--mut)} .empty{padding:40px;text-align:center;color:var(--mut)}
.items{color:var(--mut);font-size:12px;max-width:280px}
</style></head><body>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>

<script>
const firebaseConfig={apiKey:"AIzaSyBInPQeMu1dCH3leUtCoTZtgbkhrmVXEpI",authDomain:"rincon-maceda.firebaseapp.com",projectId:"rincon-maceda",storageBucket:"rincon-maceda.firebasestorage.app",messagingSenderId:"195196508954",appId:"1:195196508954:web:2d72c13bfecea82f9ceaa3"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(), db=firebase.firestore();
const ADMIN_UID='360WPbVS7tXasfWkFBOV3JGIwbl2';
const fmt=n=>"$ "+(n||0).toLocaleString("es-AR");
const sa=s=>(s||"").toString().normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase();
let PEDIDOS=[], STATS={};

document.getElementById('entrar').onclick=login;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
document.getElementById('salir').onclick=()=>auth.signOut();
document.getElementById('refrescar').onclick=cargar;
document.getElementById('buscar').oninput=pintarTabla;
document.getElementById('fEstado').onchange=pintarTabla;

function login(){
  const pw=document.getElementById('pw').value.trim(); if(!pw)return;
  document.getElementById('loginErr').textContent="";
  auth.signInWithEmailAndPassword("admin@rinconmaceda.com",pw)
    .catch(e=>{document.getElementById('loginErr').textContent="Clave incorrecta. (es rincon2026)";});
}
auth.onAuthStateChanged(u=>{
  const esAdmin = u && u.uid===ADMIN_UID;
  document.getElementById('login').style.display = esAdmin? "none":"block";
  document.getElementById('panel').style.display = esAdmin? "block":"none";
  document.getElementById('refrescar').style.display = esAdmin? "":"none";
  document.getElementById('salir').style.display = esAdmin? "":"none";
  if(esAdmin) cargar();
});

async function cargar(){
  try{
    const ps=await db.collection('pedidos').orderBy('ts','desc').limit(2000).get();
    PEDIDOS=ps.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){ try{const ps=await db.collection('pedidos').get();PEDIDOS=ps.docs.map(d=>({id:d.id,...d.data()}));}catch(e2){PEDIDOS=[];} }
  try{ const s=await db.collection('stats').doc('contadores').get(); STATS=s.exists?s.data():{}; }catch(e){ STATS={}; }
  pintar();
  const d=new Date();document.getElementById('updTxt').textContent="Actualizado "+d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}

function pintar(){
  const hoy=new Date().toISOString().slice(0,10);
  const vis=STATS.total||0, visHoy=STATS['dia_'+hoy]||0;
  const nped=PEDIDOS.length;
  const vendido=PEDIDOS.reduce((a,p)=>a+(p.total||0),0);
  const clientes=new Set(PEDIDOS.map(p=>(p.tel||p.nombre||'').trim()).filter(Boolean)).size;
  const kpis=[
    {n:vis,l:"Visitas a la página",s:visHoy+" hoy"},
    {n:nped,l:"Pedidos por WhatsApp",cls:"green"},
    {n:fmt(vendido),l:"Total pedido",cls:"earth"},
    {n:clientes,l:"Clientes"},
  ];
  document.getElementById('kpis').innerHTML=kpis.map(k=>"<div class='kpi "+(k.cls||'')+"'><div class=n>"+k.n+"</div><div class=l>"+k.l+"</div>"+(k.s?"<div class=s>"+k.s+"</div>":"")+"</div>").join("");
  // origen
  const orig={}; Object.keys(STATS).forEach(k=>{if(k.indexOf('origen_')===0)orig[k.slice(7)]=STATS[k];});
  const maxO=Math.max(1,...Object.values(orig));
  const ICN={directo:'🔗 Directo',instagram:'📸 Instagram',facebook:'👍 Facebook',web:'🌐 Web'};
  document.getElementById('origenBox').innerHTML=Object.keys(orig).length?
    Object.entries(orig).sort((a,b)=>b[1]-a[1]).map(([k,v])=>"<div class=bar><span class=lab>"+(ICN[k]||k)+"</span><span class=track><span class=fill style='width:"+Math.round(v/maxO*100)+"%'></span></span><span class=v>"+v+"</span></div>").join("")
    :"<div class=muted style='font-size:13px'>Sin datos de visitas todavía.</div>";
  // top productos
  const top={}; PEDIDOS.forEach(p=>(p.items||[]).forEach(it=>{top[it.nom]=(top[it.nom]||0)+(it.qty||0);}));
  const arr=Object.entries(top).sort((a,b)=>b[1]-a[1]).slice(0,8); const maxT=Math.max(1,...arr.map(x=>x[1]));
  document.getElementById('topBox').innerHTML=arr.length?
    arr.map(([k,v])=>"<div class=bar><span class=lab style='min-width:0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis'>"+k+"</span><span class=v>"+v+"</span></div>").join("")
    :"<div class=muted style='font-size:13px'>Sin pedidos todavía.</div>";
  pintarTabla();
}

function pintarTabla(){
  const q=sa(document.getElementById('buscar').value.trim());
  const fe=document.getElementById('fEstado').value;
  let rows=PEDIDOS.filter(p=>{
    if(fe && p.estado!==fe)return false;
    if(q){const t=sa((p.nombre||"")+" "+(p.tel||"")+" "+((p.items||[]).map(i=>i.nom).join(" ")));if(!q.split(/\s+/).every(w=>t.includes(w)))return false;}
    return true;
  });
  const tb=document.getElementById('tbody'); const vacio=document.getElementById('vacio');
  if(!rows.length){tb.innerHTML="";vacio.style.display=PEDIDOS.length?"none":"block";if(PEDIDOS.length)vacio.style.display="block",vacio.textContent="Ningún pedido coincide con el filtro.";return;}
  vacio.style.display="none";
  tb.innerHTML=rows.map(p=>{
    const tel=(p.tel||"").replace(/[^0-9]/g,"");
    const wa=tel?("<a class=wa href='https://wa.me/"+(tel.length<=10?("549"+tel):tel)+"' target=_blank>"+p.tel+" 📲</a>"):"<span class=muted>—</span>";
    const items=(p.items||[]).map(i=>i.qty+"× "+i.nom).join(", ");
    const fecha=p.ts?new Date(p.ts).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):"—";
    return "<tr><td><span class=nm>"+(p.nombre||"—")+"</span></td><td>"+wa+"</td><td class=items>"+(items||"—")+"</td><td>"+(p.n||0)+"</td><td><b>"+fmt(p.total)+"</b></td><td class=muted>"+(p.origen||"—")+"</td><td><span class='est wa'>pidió x WA</span></td><td class=muted>"+fecha+"</td></tr>";
  }).join("");
}
